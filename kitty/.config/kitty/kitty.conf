# Font
font_family JetBrainsMono Nerd Font
font_size 11.0

# Window
window_padding_width 8
background_opacity 0.95

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted

# URLs — require Ctrl+click to open (prevent accidental clicks)
mouse_map left click ungrabbed mouse_handle_click selection prompt
mouse_map ctrl+left click ungrabbed mouse_handle_click link
# Same for grabbed mode (inside tmux with mouse on)
mouse_map ctrl+left click grabbed mouse_handle_click link

# Scrollback
scrollback_lines 50000
scrollback_pager_history_size 100
scrollback_pager nvim -u NONE -c "set nonum nornu signcolumn=no showtabline=0 laststatus=0 scrolloff=0" -c "normal G" -

# ── Hierarchy: OS Window > Tab > Window (split/pane) ──────
#
# CREATE
#   ctrl+shift+enter  — new window (split) in current tab
#   ctrl+shift+t      — new tab in current OS window
#   ctrl+shift+n      — new OS window           (default, not remapped)
#
# NAVIGATE
#   ctrl+shift+] / [  — next/prev window         (default)
#   ctrl+shift+→ / ←  — next/prev tab            (default)
#   ctrl+shift+1-9    — focus window by number    (default)
#
# CLOSE
#   ctrl+shift+w      — close window              (default)
#   ctrl+shift+q      — close tab                 (default)
#
# MOVE / DETACH — "detach with a target" IS the attach
#   ctrl+shift+d      — window → new tab
#   ctrl+shift+m      — window → pick a tab       (interactive)
#   ctrl+shift+o      — window → new OS window
#   ctrl+shift+alt+d  — tab → pick an OS window   (interactive)
#   ctrl+shift+. / ,  — reorder tab fwd/back      (default)
#   drag & drop       — tabs between OS windows   (kitty 0.46+)
#
# LAYOUT
#   ctrl+shift+l      — cycle layouts             (default)
#   ctrl+shift+r      — resize mode               (default)

# New windows/splits/tabs inherit the working directory
map kitty_mod+enter launch --cwd=current
map kitty_mod+t     launch --cwd=current --type=tab

# Detach: window → new tab
map kitty_mod+d detach_window new-tab
# Detach: window → pick which tab (interactive)
map kitty_mod+m detach_window ask
# Detach: window → new OS window
map kitty_mod+o detach_window new
# Detach: tab → pick which OS window (interactive)
map kitty_mod+alt+d detach_tab ask

# Bell
enable_audio_bell no


# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME