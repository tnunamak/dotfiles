# --- General ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty*:RGB"       # true color
set -as terminal-features ",xterm-kitty*:usstyle"   # undercurls (nvim LSP)
set -as terminal-features ",xterm-kitty*:clipboard"  # OSC 52 clipboard
set -g mouse on
set -g history-limit 50000
set -g escape-time 0          # no delay after Esc (important for nvim)
set -g focus-events on
set -g set-clipboard on

# --- Prefix ---
set -g prefix C-Space         # Ctrl+Space (easier than Ctrl+b)
unbind C-b
bind C-Space send-prefix
set -g prefix2 C-a            # fallback for mobile (Termius)

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Windows ---
bind c new-window -c "#{pane_current_path}"

# --- Reload ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# --- Status bar (minimal, Tokyo Night) ---
set -g status-position bottom
set -g status-style 'bg=default,fg=#a9b1d6'
set -g status-left '#[fg=#7aa2f7,bold][#S] '
set -g status-left-length 20
set -g status-right ''
set -g window-status-current-format '#[fg=#7aa2f7,bold]#I:#W'
set -g window-status-format '#[fg=#565f89]#I:#W'
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#7aa2f7'

# --- Plugins (order matters!) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# --- Resurrect ---
set -g @resurrect-capture-pane-contents 'on'

# --- Continuum ---
set -g @continuum-boot 'on'      # systemd auto-start on login

# --- Environment ---
# continuum-boot starts tmux before Wayland session, so WAYLAND_DISPLAY
# is missing initially. update-environment imports it when a client attaches
# (e.g., opening kitty). New panes after attach get the correct value.
# Restored panes keep stale env but Claude/Codex don't need WAYLAND_DISPLAY.
set -ga update-environment " WAYLAND_DISPLAY"

# --- Initialize TPM ---
run '~/.tmux/plugins/tpm/tpm'

# --- Fix grouped session restore (must be after TPM) ---
# tmux-assistant-resurrect sets @resurrect-hook-post-restore-all via TPM.
# We override it here to wrap their script: first fix grouped session window
# focus using select-window (works headlessly, unlike switch-client), then
# chain to assistant-resurrect's restore.
set -g @resurrect-hook-post-restore-all "bash '~/.config/tmux/scripts/post-restore-grouped-focus.sh'"
